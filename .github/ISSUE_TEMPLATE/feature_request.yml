name: Feature Request
description: Suggest an idea for this project
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem_statement
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Describe your solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - AI Engine
        - GitHub Integration
        - Web UI
        - Backend API
        - CI/CD
        - Documentation
    validations:
      required: true
