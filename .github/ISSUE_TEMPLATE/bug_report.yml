name: Bug Report
description: File a bug report
title: "[BUG] "
labels: ["bug"]
body:
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production
        - Staging
        - Development
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: repo_affected
    attributes:
      label: Which repo were you managing?
    validations:
      required: true
  - type: textarea
    id: error_logs
    attributes:
      label: Paste relevant logs
    validations:
      required: false
  - type: input
    id: gemini_model
    attributes:
      label: Which Gemini model task failed?
    validations:
      required: false
